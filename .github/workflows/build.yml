name: Build

on:
  schedule:
    - cron: "30 3 * * *"  # Nightly at 3:30 UTC
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip release creation'
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      version: ${{ steps.check.outputs.version }}
      is_nightly: ${{ steps.check.outputs.is_nightly }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ startsWith(github.ref, 'refs/tags/') && github.ref || 'dev' }}
          fetch-depth: 0

      - name: Check build conditions
        id: check
        run: |
          VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "is_nightly=false" >> $GITHUB_OUTPUT
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "is_nightly=true" >> $GITHUB_OUTPUT
            echo "tag=nightly-$(date -u +%Y%m%d)" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT

            LAST_TAG=$(git tag --list "nightly-*" --sort=-version:refname | head -1)

            if [ -z "$LAST_TAG" ]; then
              echo "should_build=true" >> $GITHUB_OUTPUT
            else
              USER_FACING_COUNT=$(git log "$LAST_TAG"..HEAD --pretty='%s' --no-merges --first-parent | \
                grep -Ei '^(feat|fix|perf|security)(\([^)]+\))?:' | \
                grep -Eiv '^fix\((test|ci|build|chore|docs|style|refactor)\):' | \
                wc -l | tr -d ' ')

              if [ "${USER_FACING_COUNT:-0}" -gt 0 ]; then
                echo "should_build=true" >> $GITHUB_OUTPUT
              else
                echo "should_build=false" >> $GITHUB_OUTPUT
              fi
            fi
          fi

  build-windows:
    name: Windows
    needs: prepare
    if: needs.prepare.outputs.should_build == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.is_nightly == 'true' && 'dev' || github.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e .[dev] pyinstaller pillow

      - name: Build
        run: |
          python scripts/generate_build_meta.py ${{ needs.prepare.outputs.is_nightly == 'true' && needs.prepare.outputs.tag || '' }}
          python -m PyInstaller --clean --noconfirm installer/portkeydrop.spec

      - name: Validate runtime deps for installer/portable
        run: |
          python scripts/verify_portable_zip.py --runtime-dir dist/PortkeyDrop_dir --pyz-path build/portkeydrop/PYZ-00.pyz --require-runtime-no-data

      - name: Create installer
        shell: cmd
        run: |
          echo [version]> dist\version.txt
          echo value=${{ needs.prepare.outputs.version }}>> dist\version.txt
          choco install innosetup -y --no-progress
          "%ProgramFiles(x86)%\Inno Setup 6\ISCC.exe" installer\portkeydrop.iss

      - name: Create portable ZIP
        shell: cmd
        run: |
          cd dist
          if exist "PortkeyDrop_dir" (
            if exist "PortkeyDrop_portable" rmdir /s /q "PortkeyDrop_portable"
            xcopy "PortkeyDrop_dir" "PortkeyDrop_portable\" /E /I /Y >nul
            if not exist "PortkeyDrop_portable\\data" mkdir "PortkeyDrop_portable\\data"
            cd PortkeyDrop_portable
            7z a -tzip "..\PortkeyDrop_Portable_v${{ needs.prepare.outputs.version }}.zip" *
            cd ..
            rmdir /s /q "PortkeyDrop_portable"
          ) else (
            7z a -tzip "PortkeyDrop_Portable_v${{ needs.prepare.outputs.version }}.zip" "PortkeyDrop.exe"
          )

      - name: Validate portable ZIP contents
        run: |
          python scripts/verify_portable_zip.py --runtime-dir dist/PortkeyDrop_dir --pyz-path build/portkeydrop/PYZ-00.pyz --require-runtime-no-data --portable-zip dist/PortkeyDrop_Portable_v${{ needs.prepare.outputs.version }}.zip

      - uses: actions/upload-artifact@v6
        with:
          name: windows
          path: |
            dist/PortkeyDrop_Setup_*.exe
            dist/PortkeyDrop_Portable_*.zip

  release:
    name: Release
    needs: [prepare, build-windows]
    if: always() && needs.prepare.outputs.should_build == 'true' && needs.build-windows.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.is_nightly == 'true' && 'dev' || github.ref }}
          fetch-depth: 0

      - uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Prepare release
        id: prep
        env:
          IS_NIGHTLY: ${{ needs.prepare.outputs.is_nightly }}
          VERSION: ${{ needs.prepare.outputs.version }}
          TAG: ${{ needs.prepare.outputs.tag }}
          CLIFF_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p assets
          TIMESTAMP=$(date -u +%Y%m%d)

          # Rename assets based on release type
          for f in dist/*.exe dist/*.zip; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            if [ "$IS_NIGHTLY" = "true" ]; then
              case "$name" in
                *Setup*.exe) mv "$f" "assets/PortkeyDrop-nightly-${TIMESTAMP}-windows-setup.exe" ;;
                *Portable*.zip) mv "$f" "assets/PortkeyDrop-nightly-${TIMESTAMP}-windows-portable.zip" ;;
              esac
            else
              case "$name" in
                *Setup*.exe) mv "$f" "assets/PortkeyDrop-${VERSION}-windows-setup.exe" ;;
                *Portable*.zip) mv "$f" "assets/PortkeyDrop-${VERSION}-windows-portable.zip" ;;
              esac
            fi
          done

          # Generate checksums
          cd assets && sha256sum * > checksums.txt 2>/dev/null || true

          # Generate release notes via git-cliff (nightly and stable)
          cd ..
          if [ "$IS_NIGHTLY" = "true" ]; then
            LAST_TAG=$(git tag --list "nightly-*" --sort=-version:refname | head -1)
            if [ -n "$LAST_TAG" ]; then
              npx git-cliff@latest "$LAST_TAG"..HEAD --strip all > notes.md.tmp || true
              awk '!seen[$0]++' notes.md.tmp > notes.md && rm -f notes.md.tmp
              [ -s notes.md ] || echo "- No user-facing changes" > notes.md
            else
              echo "Initial nightly build" > notes.md
            fi
          else
            npx git-cliff@latest --latest --ignore-tags "nightly-.*" --strip all > notes.md.tmp || true
            awk '!seen[$0]++' notes.md.tmp > notes.md && rm -f notes.md.tmp
            if [ ! -s notes.md ]; then
              echo "See [CHANGELOG.md](https://github.com/Orinks/PortkeyDrop/blob/main/CHANGELOG.md) for full release notes." > notes.md
            fi
          fi

      - name: Create release
        if: ${{ inputs.dry_run != true }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IS_NIGHTLY: ${{ needs.prepare.outputs.is_nightly }}
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          if [ "$IS_NIGHTLY" = "true" ]; then
            gh release delete "$TAG" -y --cleanup-tag 2>/dev/null || true
            gh release create "$TAG" assets/* --notes-file notes.md \
              --title "Nightly $(date -u +%Y-%m-%d)" --prerelease --target dev
          else
            if gh release view "$TAG" &>/dev/null; then
              gh release upload "$TAG" assets/* --clobber
            else
              gh release create "$TAG" assets/* --notes-file notes.md \
                --title "PortkeyDrop v${VERSION}"
            fi
          fi

      - name: Trigger pages update
        if: ${{ inputs.dry_run != true }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run update-pages.yml || true
