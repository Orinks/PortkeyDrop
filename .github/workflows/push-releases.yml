name: Update WordPress release page

on:
  workflow_call:
    inputs:
      wp_page_id:
        description: "WordPress page ID for the existing PortkeyDrop release page"
        required: true
        type: string
    secrets:
      WP_APPLICATION_PASSWORD:
        required: true
      WP_SITE_URL:
        required: true
      WP_USERNAME:
        required: true
  workflow_dispatch:
    inputs:
      wp_page_id:
        description: "WordPress page ID for the existing PortkeyDrop release page"
        required: true
        type: string

jobs:
  update-page:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
      - name: Update WordPress page from latest release
        env:
          WP_URL: ${{ secrets.WP_SITE_URL }}
          WP_PAGE_ID: ${{ inputs.wp_page_id }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APPLICATION_PASSWORD: ${{ secrets.WP_APPLICATION_PASSWORD }}
          REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 .github/scripts/push_releases.py
